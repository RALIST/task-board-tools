# tb project config
# Generated by `tb init`; rerun `tb init` to refresh with .bak backups.

# Board directory relative to this file.
board: board

# Task ID prefix.
prefix: TB

# Canonical kanban WIP limits. Per-column limits cap the number of
# tasks allowed in each pull-based column. Set to 0 (or omit) to disable.
# `wip_limit` (legacy) seeds the in-progress limit when no explicit
# wip_limit_in_progress is set.
# wip_limit: 2
# wip_limit_ready: 5
# wip_limit_in_progress: 2
# wip_limit_code_review: 3

# WIP enforcement: 'warn' (default) emits a stderr warning when a
# move would exceed the destination column's limit. 'strict' rejects
# the move with a non-zero exit so the source state is left untouched.
# wip_enforcement: warn

# File extensions scanned by `tb scan`.
scan_extensions: .go,.ts,.svelte,.js
