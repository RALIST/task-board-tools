<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="100%" height="100%">
  <!-- Three kanban columns: Backlog, In-Progress, Done -->
  <!-- Column 1: Backlog (leftmost, two cards) -->
  <rect x="128" y="192" width="224" height="640" rx="36" ry="36" fill="#2a3548"/>
  <rect x="160" y="240" width="160" height="96" rx="16" ry="16" fill="#6c7a90"/>
  <rect x="160" y="368" width="160" height="96" rx="16" ry="16" fill="#6c7a90"/>

  <!-- Column 2: In Progress (center, one card highlighted) -->
  <rect x="400" y="192" width="224" height="640" rx="36" ry="36" fill="#2a3548"/>
  <rect x="432" y="240" width="160" height="96" rx="16" ry="16" fill="#4f8bff"/>
  <rect x="432" y="368" width="160" height="56" rx="16" ry="16" fill="#6c7a90"/>

  <!-- Column 3: Done (rightmost, with check) -->
  <rect x="672" y="192" width="224" height="640" rx="36" ry="36" fill="#2a3548"/>
  <rect x="704" y="240" width="160" height="96" rx="16" ry="16" fill="#3ec08a"/>
  <!-- check mark on the green card -->
  <path d="M 736 282 L 768 314 L 832 252" stroke="#ffffff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
