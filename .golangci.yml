version: "2"

# Shared config for both Go modules. Run it with `make lint-go`; the wrapper
# enters `cli/` and `gui/` explicitly because the repository root is a Go
# workspace, not a standalone module.
run:
  timeout: 5m

linters:
  # Start from an empty set so the baseline stays focused on correctness,
  # robustness, dead code, unchecked errors, and suspicious constructs.
  #
  # Style-only and churn-heavy families such as revive, wsl_v5, cyclop,
  # funlen, gocognit, misspell, varnamelen, and the staticcheck ST/QF/S
  # simplification/style groups are intentionally not enabled in this first
  # pass. They can be added later if a concrete project risk justifies them.
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - errorlint
    - nilerr
    - nilnesserr
    - makezero
    - wastedassign
    - unconvert
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
    staticcheck:
      # Keep staticcheck to correctness diagnostics. Style (ST*), quick-fix
      # (QF*), and simplification (S*) checks are useful later but too noisy for
      # the initial lint gate.
      checks:
        - SA*
  exclusions:
    generated: lax
    presets:
      - common-false-positives
      - std-error-handling
    paths:
      # The GUI module contains frontend dependencies under node_modules; any
      # Go sources there are third-party code, not part of this repo's Go lint
      # surface.
      - (^|/)frontend/node_modules/
      # Wails' generated iOS scaffold is build-tagged/platform support code and
      # currently trips host-only unused analysis outside an iOS build.
      - (^|/)build/ios/
    rules:
      # TB-249 tracks the CLI baseline findings from the initial lint pass.
      # These narrow suppressions keep the new workflow green without hiding
      # unrelated future diagnostics.
      - linters: [errcheck]
        path: (^|/)cli/board\.go
        text: "Error return value of `syscall.Flock` is not checked"
      - linters: [errcheck]
        path: (^|/)cli/scan\.go
        text: "Error return value of `filepath.Walk` is not checked"
      - linters: [nilerr]
        path: (^|/)cli/(board|ready|scan)\.go
        text: "error is not nil.*but it returns nil"
      - linters: [unused]
        path: (^|/)cli/board\.go
        text: "func (writeSimpleYAML|statusFromTaskPath) is unused"
issues:
  max-same-issues: 5
